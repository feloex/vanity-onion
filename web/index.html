<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vanity-onion</title>
    <style>
        body {
            font-family: sans-serif;
            max-width: 710px;
            margin: 32px auto;
            padding: 0 16px;
            line-height: 1.4;
        }

        a {
            color: #0b57d0;
        }

        .header-row,
        .controls {
            display: flex;
            gap: 8px;
        }

        .header-row {
            align-items: baseline;
        }

        .controls {
            flex-wrap: wrap;
        }

        input,
        button {
            padding: 6px 10px;
        }

        .output-card {
            margin-top: 14px;
            padding: 10px;
            border: 1px solid #ccc;
            background: #f7f7f7;
            white-space: pre-wrap;
            word-break: break-word;
        }

        h1 {
            margin: 0;
        }

        p {
            margin: 0 0 25px;
        }
        
        .reveal-btn {
            cursor: pointer;
            color: #000000;
            text-decoration: underline;
        }
    </style>
    <script src="wasm_exec.js"></script>
    <script>
        // tor onion addresses only support lowercase letters and digits between 2 and 7
        function formatInput(input) {
            input.value = input.value.toLowerCase().replace(/[^a-z2-7]/g, '')
        }

        function generate() {
            const prefix = document.getElementById("prefix").value
            

            let currentResult = null
            let downloadBtn = null

            const numCores = navigator.hardwareConcurrency || 4
            console.log("numCores:", numCores)

            workers = [];

            for (let i = 0; i < numCores; i++) {
                const worker = new Worker("worker.js")
                workers.push(worker)
                worker.postMessage({prefix})

                worker.onmessage = function(e) {
                    if (e.data.type == "zip") {
                        const zipBlob = new Blob([e.data.zipArray], {type: "application/zip"})
                        downloadBtn.href = URL.createObjectURL(zipBlob)
                        downloadBtn.download = currentResult.onion + ".zip"
                        return
                    }

                    if (e.data.type == "keys"){
                        console.log(`thanks ${i}`)
                        workers.forEach(w => {
                            if (w !== worker) w.terminate()
                        })
                        currentResult = e.data.result
                        const result = currentResult

                        const prefixmatchlen = prefix.length
                        const onionString = result.onion
                        const styledOnion = "<u>" + onionString.substring(0, prefixmatchlen) + "</u>" + onionString.substring(prefixmatchlen)

                        const card = document.createElement("pre")
                        card.className = "output-card"
                        card.innerHTML = 
                            "hostname: " + styledOnion + "\n" +
                            "public key: " + result.publicKey + "\n" +
                            "private key: <span class=\"reveal-btn\" onclick=\"this.outerHTML = '" + result.privateKey + "'\">[Click to reveal]</span>\n"

                        downloadBtn = document.createElement("a")
                        card.appendChild(downloadBtn)
                        downloadBtn.textContent = "download keys"

                        const container = document.getElementById("output-container")
                        container.prepend(card)

                        worker.postMessage({
                            action: "downloadKeys",
                            onion: result.onion,
                            privateKey: result.privateKey,
                            publicKey: result.publicKey
                        })
                    }
                }
            }
        }
    </script>
</head>
<body>
    <div class="header-row"> 
        <h1>vanity-onion</h1> 
        <a href="https://github.com/feloex/vanity-onion">GitHub repository</a> 
    </div>

    <p>Easily generate tor vanity addresses based on a given prefix.</p>

    <div class="controls">
        <input type="text" id="prefix" placeholder="Prefix (e.g. abc)" oninput="formatInput(this)">
        <button onclick="generate()">generate</button>
    </div>

    <hr>
    <div id="output-container"></div>
</body>
</html>
