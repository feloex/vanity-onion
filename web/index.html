<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vanity-onion</title>
    <style>
        body {
            font-family: sans-serif;
            max-width: 710px;
            margin: 32px auto;
            padding: 0 16px;
            line-height: 1.4;
        }

        a {
            color: #0b57d0;
        }

        .header-row,
        .controls {
            display: flex;
            gap: 8px;
        }

        .header-row {
            align-items: baseline;
        }

        .controls {
            flex-wrap: wrap;
        }

        input,
        button {
            padding: 6px 10px;
        }

        .output-card {
            margin-top: 14px;
            padding: 10px;
            border: 1px solid #ccc;
            background: #f7f7f7;
            white-space: pre-wrap;
            word-break: break-word;
        }

        h1 {
            margin: 0;
        }

        p {
            margin: 0 0 25px;
        }
        
        .reveal-btn {
            cursor: pointer;
            color: #000000;
            text-decoration: underline;
        }
    </style>
    <script src="wasm_exec.js"></script>
    <script>
        const go = new Go()
        let wasmReady = WebAssembly.instantiateStreaming(fetch("main.wasm"), go.importObject).then((result) => {
            go.run(result.instance)
        });

        // tor onion addresses only support lowercase letters and digits between 2 and 7
        function formatInput(input) {
            input.value = input.value.toLowerCase().replace(/[^a-z2-7]/g, '')
        }

        let hashrateInterval = null

        function generate() {
            const prefix = document.getElementById("prefix").value
            

            let currentResult = null
            let downloadBtn = null

            const numCores = navigator.hardwareConcurrency || 4
            console.log("numCores:", numCores)

            if (hashrateInterval){
                clearInterval(hashrateInterval)
            }

            workers = [];
            let totalAttempts = 0
            const startTime = Date.now()
            const expected = Math.pow(32, prefix.length)
            
            let statusEl = document.getElementById("status-text")

            if (!statusEl) {
                statusEl = document.createElement("p")
                statusEl.id = "status-text"
                document.getElementById("output-container").before(statusEl)
            }
            
            let hashrate
            let effort
       
            hashrateInterval = setInterval(() => {
                const elapsedSeconds = (Date.now() - startTime) / 1000
                if (elapsedSeconds > 0) {
                    const stats = calculateStats(totalAttempts, prefix.length, elapsedSeconds)
                    hashrate = stats.hashrate
                    effort = stats.effort
                    statusEl.innerText = `${hashrate.toFixed(3)}h/s\; ${effort.toFixed(1)}%`
                }
            }, 500)

            for (let i = 0; i < numCores; i++){
                const worker = new Worker("worker.js")
                workers.push(worker)
                worker.postMessage({prefix})       

                worker.onmessage = function(e){
                    if(e.data.type == "zip"){
                        const zipBlob = new Blob([e.data.zipArray], {type: "application/zip"})
                        downloadBtn.href = URL.createObjectURL(zipBlob)
                        downloadBtn.download = currentResult.onion + ".zip"
                        return
                    }

                    if(e.data.type == "progress"){
                        totalAttempts += e.data.hashes
                        return
                    }

                    if(e.data.type == "keys"){
                        console.log(`thanks ${i}`)
                        if (hashrateInterval) clearInterval(hashrateInterval)
                        
                        const elapsedSeconds = (Date.now() - startTime) / 1000
                        
                        // calculate again to fix race condition
                        const stats = calculateStats(totalAttempts, prefix.length, elapsedSeconds)
                        effort = stats.effort
                        
                        // ${hashrate.toFixed(0)} h/s\; 
                        statusEl.innerText = ""

                        workers.forEach(w => {
                            if (w !== worker) w.terminate()
                        })
                        currentResult = e.data.result
                        const result = currentResult

                        const prefixmatchlen = prefix.length
                        const onionString = result.onion
                        const styledOnion = "<u>" + onionString.substring(0, prefixmatchlen) + "</u>" + onionString.substring(prefixmatchlen)

                        const card = document.createElement("pre")
                        card.className = "output-card"
                        card.innerHTML = 
                            "hostname: " + styledOnion + "\n" +
                            "public key: " + result.publicKey + "\n" +
                            "private key: <span class=\"reveal-btn\" onclick=\"this.outerHTML = '" + result.privateKey + "'\">[Click to reveal]</span>\n"

                        downloadBtn = document.createElement("a")
                        card.appendChild(downloadBtn)
                        downloadBtn.textContent = "download keys"
                        
                        const statsSpan = document.createElement("span")
                        statsSpan.textContent = `took ${elapsedSeconds.toFixed(2)}s; ${effort.toFixed(3)}% effort`
                        statsSpan.style.float = "right"
                        statsSpan.style.color = "#888"
                        card.appendChild(statsSpan)

                        const container = document.getElementById("output-container")
                        container.prepend(card)

                        worker.postMessage({
                            action: "downloadKeys",
                            onion: result.onion,
                            privateKey: result.privateKey,
                            publicKey: result.publicKey
                        })
                    }
                }
            }
        }
    </script>
</head>
<body>
    <div class="header-row"> 
        <h1>vanity-onion</h1> 
        <a href="https://github.com/feloex/vanity-onion">GitHub repository</a> 
    </div>

    <p>Easily generate tor vanity addresses based on a given prefix.</p>

    <div class="controls">
        <input type="text" id="prefix" placeholder="Prefix (e.g. abc)" oninput="formatInput(this)">
        <button onclick="generate()">generate</button>
    </div>

    <hr>
    <div id="output-container"></div>
</body>
</html>
